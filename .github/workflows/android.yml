name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Android SDK command-line tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest

      - name: Accept licenses and install SDK components
        env:
          ANDROID_HOME: $HOME/android-sdk
          ANDROID_SDK_ROOT: $HOME/android-sdk
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Sync Capacitor
        env:
          CAPACITOR_SERVER_URL: http://10.50.3.81
          ANDROID_HOME: $HOME/android-sdk
          ANDROID_SDK_ROOT: $HOME/android-sdk
        run: npx cap sync android

      - name: Build Android APK
        env:
          JAVA_HOME: /opt/java/openjdk
          ANDROID_HOME: $HOME/android-sdk
          ANDROID_SDK_ROOT: $HOME/android-sdk
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -q

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5

      - name: Copy APK to server via SCP
        if: always()
        env:
          SERVER_HOST: 10.50.3.81
          SERVER_USER: wh
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          apt-get update -qq && apt-get install -y -qq sshpass > /dev/null 2>&1 || true
          sshpass -p "$SERVER_PASSWORD" scp -o StrictHostKeyChecking=no -o ConnectTimeout=10             android/app/build/outputs/apk/debug/app-debug.apk             $SERVER_USER@$SERVER_HOST:/opt/wh/frontend/android/app/build/outputs/apk/debug/app-debug.apk
          sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST             "cp /opt/wh/frontend/android/app/build/outputs/apk/debug/app-debug.apk '/opt/wh/frontend/android/app/build/outputs/apk/debug/物业维修管理.apk'"
        continue-on-error: true
